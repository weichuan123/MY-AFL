name: AFL Fuzzing

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to fuzz'
        required: true
        default: 'dev'

jobs:
  fuzzing:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libtool \
            autoconf \
            automake \
            git \
            libini-config-dev \
            libseccomp-dev

      - name: Build and install cJSON from source
        run: |
          git clone https://github.com/DaveGamble/cJSON.git /tmp/cJSON
          cd /tmp/cJSON
          mkdir -p build
          cd build
          cmake .. -DENABLE_CJSON_UTILS=On -DENABLE_CJSON_TEST=Off -DCMAKE_INSTALL_PREFIX=/usr
          make -j"$(nproc)"
          sudo make install

      - name: Build AFL tools from source
        run: |
          sudo make -j"$(nproc)"

      - name: Build preeny desock.so
        run: |
          git clone https://github.com/zardus/preeny.git /tmp/preeny
          make -C /tmp/preeny/src desock.so
          ls -lah /tmp/preeny/src/desock.so

      - name: Prepare runner for AFL crash detection
        shell: bash
        run: |
          echo "Before: $(cat /proc/sys/kernel/core_pattern)"
          sudo sysctl -w kernel.core_pattern=core
          echo "After:  $(cat /proc/sys/kernel/core_pattern)"

      - name: Run AFL fuzzing for limited time
        shell: bash
        run: |
          cd libiec61850-1.5.1/build/examples/server_example_basic_io
          mkdir -p outputs_test logs
          chmod +x ./server_example_basic_io
          export AFL_NO_UI=1

          cleanup() {
            if [ -n "${MON_PID:-}" ]; then
              kill "$MON_PID" 2>/dev/null || true
              wait "$MON_PID" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          (
            while true; do
              sleep 60
              echo "===== $(date) ====="
              if [ -f outputs_test/default/fuzzer_stats ]; then
                cat outputs_test/default/fuzzer_stats
                echo
              else
                echo "fuzzer_stats not generated yet"
                echo
              fi
            done
          ) &
          MON_PID=$!

          set +e
          timeout 21300 bash -c '
            LD_PRELOAD=/tmp/preeny/src/desock.so \
            ../../../../afl-fuzz \
              -i inputs/seed_bin_origin \
              -o outputs_test/ \
              -m none \
              -- ./server_example_basic_io
          ' 2>&1 | tee logs/afl-fuzz-live.log
          rc=${PIPESTATUS[0]}
          set -e

          echo "afl/timeout exit code: $rc"

          if [ -f outputs_test/default/plot_data ]; then
            echo "===== plot_data tail ====="
            tail -n 20 outputs_test/default/plot_data | tee logs/plot_data_tail.log
          fi

          if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
            exit "$rc"
          fi

      - name: Pack fuzzing results
        if: always()
        shell: bash
        run: |
          cd libiec61850-1.5.1/build/examples/server_example_basic_io
          tar -czf fuzzing-findings.tar.gz outputs_test

      - name: Upload fuzzing log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-log
          path: libiec61850-1.5.1/build/examples/server_example_basic_io/logs/

      - name: Upload plot_data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-plot-data
          path: libiec61850-1.5.1/build/examples/server_example_basic_io/outputs_test/default/plot_data
          if-no-files-found: warn

      - name: Upload fuzzing results archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-findings
          path: libiec61850-1.5.1/build/examples/server_example_basic_io/fuzzing-findings.tar.gz