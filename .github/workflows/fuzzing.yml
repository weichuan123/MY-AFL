name: AFL Fuzzing

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to fuzz'
        required: true
        default: 'dev'

jobs:
  fuzzing:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libtool \
            autoconf \
            automake \
            git \
            libini-config-dev \
            libseccomp-dev

      - name: Build and install cJSON from source
        run: |
          git clone https://github.com/DaveGamble/cJSON.git /tmp/cJSON
          cd /tmp/cJSON
          mkdir -p build
          cd build
          cmake .. -DENABLE_CJSON_UTILS=On -DENABLE_CJSON_TEST=Off -DCMAKE_INSTALL_PREFIX=/usr
          make -j"$(nproc)"
          sudo make install

      - name: Build AFL tools from source
        run: |
          make -j"$(nproc)"

      - name: Build preeny desock.so
        run: |
          git clone https://github.com/zardus/preeny.git /tmp/preeny
          make -C /tmp/preeny/src desock.so
          ls -lah /tmp/preeny/src/desock.so

      - name: Run AFL fuzzing for limited time
        shell: bash
        continue-on-error: true
        run: |
          cd libiec61850-1.5.1/build/examples/server_example_basic_io
          mkdir -p outputs_test logs
          export AFL_NO_UI=1

          timeout 3600 bash -c '
            LD_PRELOAD=/tmp/preeny/src/desock.so \
            ../../../../afl-fuzz \
              -i inputs/seed_bin_origin \
              -o outputs_test/ \
              -m none \
              -P ./server_example_basic_io
          ' 2>&1 | tee logs/afl-fuzz-live.log

          test ${PIPESTATUS[0]} -eq 0 -o ${PIPESTATUS[0]} -eq 124

      - name: Upload fuzzing log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-log
          path: libiec61850-1.5.1/build/examples/server_example_basic_io/logs/

      - name: Archive fuzzing results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-findings
          path: libiec61850-1.5.1/build/examples/server_example_basic_io/outputs_test/