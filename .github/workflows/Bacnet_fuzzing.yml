name: BACNET Fuzzing
run-name: BACNET fuzzing [${{ inputs.run_segment }}/${{ inputs.max_segments }}] on ${{ inputs.target_branch }}

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to fuzz'
        required: true
        default: 'dev'
        type: string
      run_segment:
        description: 'Current fuzzing segment number'
        required: true
        default: '1'
        type: string
      max_segments:
        description: 'Maximum number of chained fuzzing segments'
        required: true
        default: '8'
        type: string
      resume_run_id:
        description: 'Previous workflow run ID used for AFL resume'
        required: false
        default: ''
        type: string
      resume_artifact_name:
        description: 'Artifact name that contains previous AFL outputs'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  actions: write

jobs:
  fuzzing:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Install only missing apt packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libini-config-dev \
            libseccomp-dev

      - name: Restore cJSON source cache
        id: cache-cjson-src
        uses: actions/cache@v4
        with:
            path: ${{ github.workspace }}/.cache/cJSON
            key: ${{ runner.os }}-cjson-src-v1.7.18

      - name: Build and install cJSON from source
        run: |
          if [ ! -d "${{ github.workspace }}/.cache/cJSON/.git" ]; then
            git clone --depth 1 --branch v1.7.18 https://github.com/DaveGamble/cJSON.git "${{ github.workspace }}/.cache/cJSON"
          fi

          cd "${{ github.workspace }}/.cache/cJSON"
          mkdir -p build
          cd build
          cmake .. -DENABLE_CJSON_UTILS=On -DENABLE_CJSON_TEST=Off -DCMAKE_INSTALL_PREFIX=/usr
          make -j"$(nproc)"
          sudo make install
          sudo ldconfig

      - name: Build AFL tools from source
        run: |
          sudo make -j"$(nproc)"

      - name: Restore AFL state from previous segment
        if: ${{ inputs.resume_run_id != '' && inputs.resume_artifact_name != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cd bacnet
          rm -rf outputs_test
          mkdir -p /tmp/afl-resume
          gh run download "${{ inputs.resume_run_id }}" \
            -n "${{ inputs.resume_artifact_name }}" \
            -D /tmp/afl-resume
          tar -xzf /tmp/afl-resume/bacnet-findings.tar.gz
          test -d outputs_test/queue
          echo "Resumed AFL queue from run ${{ inputs.resume_run_id }} / artifact ${{ inputs.resume_artifact_name }}"

      - name: Prepare runner for AFL crash detection
        shell: bash
        run: |
          echo "Before: $(cat /proc/sys/kernel/core_pattern)"
          sudo sysctl -w kernel.core_pattern=core
          echo "After:  $(cat /proc/sys/kernel/core_pattern)"

      - name: Run AFL fuzzing for limited time
        shell: bash
        run: |
          cd bacnet
          mkdir -p outputs_test logs
          chmod +x ./fuzz-afl
          export AFL_NO_UI=1

          afl_input_dir="inputs"
          if [ -d outputs_test/queue ]; then
            afl_input_dir="-"
            echo "Continuing AFL with existing outputs_test corpus"
          else
            echo "Starting AFL from seed corpus"
          fi

          set +e
          timeout 21300 env \
            ../afl-fuzz \
              -i "$afl_input_dir" \
              -o outputs_test/ \
              -m none \
              -- ./fuzz-afl \
            2>&1 | tee "logs/afl-fuzz-live-seg-${{ inputs.run_segment }}.log"
          rc=${PIPESTATUS[0]}
          set -e

          echo "afl/timeout exit code: $rc"

          if [ -f outputs_test/plot_data ]; then
            echo "===== plot_data tail ====="
            tail -n 20 outputs_test/plot_data | tee "logs/plot_data_tail-seg-${{ inputs.run_segment }}.log"
          fi

          if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
            exit "$rc"
          fi

      - name: Print final fuzzer_stats
        if: always()
        shell: bash
        run: |
          cd bacnet
          echo "===== final fuzzer_stats ====="
          if [ -f outputs_test/fuzzer_stats ]; then
            cat outputs_test/fuzzer_stats
          else
            echo "outputs_test/fuzzer_stats not found"
          fi

      - name: Alert by email when crashes found
        continue-on-error: true
        if: always()
        shell: bash
        env:
            WORKFLOW_NAME: ${{ github.workflow }}
            RUN_NO: ${{ github.run_number }}
            SMTP_HOST: ${{ secrets.SMTP_HOST }}
            SMTP_PORT: ${{ secrets.SMTP_PORT }}
            SMTP_USER: ${{ secrets.SMTP_USER }}
            SMTP_PASS: ${{ secrets.SMTP_PASS }}
            ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: |
            cd bacnet

            if [ ! -f outputs_test/fuzzer_stats ]; then
            echo "outputs_test/fuzzer_stats not found, skip email alert"
            exit 0
            fi

            unique_crashes="$(awk -F': *' '$1=="unique_crashes"{print $2}' outputs_test/fuzzer_stats | tail -n1)"
            total_crashes="$(awk -F': *' '$1=="total_crashes"{print $2}' outputs_test/fuzzer_stats | tail -n1)"

            unique_crashes="${unique_crashes:-0}"
            total_crashes="${total_crashes:-0}"

            echo "unique_crashes=${unique_crashes}"
            echo "total_crashes=${total_crashes}"

            if [ "$unique_crashes" -eq 0 ] && [ "$total_crashes" -eq 0 ]; then
            echo "No crashes found, no email sent"
            exit 0
            fi

            export UNIQUE_CRASHES="$unique_crashes"
            export TOTAL_CRASHES="$total_crashes"

            python3 - <<'PY'
            import os
            import smtplib
            from email.mime.text import MIMEText

            workflow = os.environ["WORKFLOW_NAME"]
            run_no = os.environ["RUN_NO"]
            unique_crashes = os.environ["UNIQUE_CRASHES"]
            total_crashes = os.environ["TOTAL_CRASHES"]

            smtp_host = os.environ["SMTP_HOST"]
            smtp_port = int(os.environ["SMTP_PORT"])
            smtp_user = os.environ["SMTP_USER"]
            smtp_pass = os.environ["SMTP_PASS"]
            alert_email = os.environ["ALERT_EMAIL"]

            subject = f"[AFL Alert] {workflow} #{run_no} detected crashes"
            body = f"""AFL crash detected.

            Workflow: {workflow}
            Sequence: #{run_no}
            unique_crashes: {unique_crashes}
            total_crashes: {total_crashes}
            """

            msg = MIMEText(body, _charset="utf-8")
            msg["Subject"] = subject
            msg["From"] = smtp_user
            msg["To"] = alert_email

            with smtplib.SMTP(smtp_host, smtp_port) as server:
                server.starttls()
                server.login(smtp_user, smtp_pass)
                server.sendmail(smtp_user, [alert_email], msg.as_string())

            print("Crash alert email sent")
            PY

      - name: Pack fuzzing results
        if: always()
        shell: bash
        run: |
          cd bacnet
          tar -czf bacnet-findings.tar.gz outputs_test

      - name: Upload fuzzing log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bacnet-log-seg-${{ inputs.run_segment }}
          path: bacnet/logs/

      - name: Upload plot_data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bacnet-plot-data-seg-${{ inputs.run_segment }}
          path: bacnet/outputs_test/plot_data
          if-no-files-found: warn

      - name: Upload fuzzing results archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bacnet-findings-seg-${{ inputs.run_segment }}
          path: bacnet/bacnet-findings.tar.gz

      - name: Trigger next fuzzing segment
        if: ${{ success() && fromJSON(inputs.run_segment) < fromJSON(inputs.max_segments) }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          next_segment=$(( ${{ inputs.run_segment }} + 1 ))
          current_artifact="bacnet-findings-seg-${{ inputs.run_segment }}"

          echo "Triggering segment ${next_segment}/${{ inputs.max_segments }} based on current AFL outputs"

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/Bacnet_fuzzing.yml/dispatches" \
            -d @- <<EOF
          {
            "ref": "dev",
            "inputs": {
              "target_branch": "${{ inputs.target_branch }}",
              "run_segment": "${next_segment}",
              "max_segments": "${{ inputs.max_segments }}",
              "resume_run_id": "${{ github.run_id }}",
              "resume_artifact_name": "${current_artifact}"
            }
          }
          EOF