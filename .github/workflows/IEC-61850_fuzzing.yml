name: IEC-61850 Fuzzing
run-name: IEC fuzzing [${{ inputs.run_segment }}/${{ inputs.max_segments }}] on ${{ inputs.target_branch }}

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to fuzz'
        required: true
        default: 'dev'
        type: string
      run_segment:
        description: 'Current fuzzing segment number'
        required: true
        default: '1'
        type: string
      max_segments:
        description: 'Maximum number of chained fuzzing segments'
        required: true
        default: '8'
        type: string
      resume_run_id:
        description: 'Previous workflow run ID used for AFL resume'
        required: false
        default: ''
        type: string
      resume_artifact_name:
        description: 'Artifact name that contains previous AFL outputs'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  actions: write

jobs:
  fuzzing:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Install only missing apt packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libini-config-dev \
            libseccomp-dev

      - name: Restore cJSON source cache
        id: cache-cjson-src
        uses: actions/cache@v4
        with:
            path: ${{ github.workspace }}/.cache/cJSON
            key: ${{ runner.os }}-cjson-src-v1.7.18

      - name: Build and install cJSON from source
        run: |
          if [ ! -d "${{ github.workspace }}/.cache/cJSON/.git" ]; then
            git clone --depth 1 --branch v1.7.18 https://github.com/DaveGamble/cJSON.git "${{ github.workspace }}/.cache/cJSON"
          fi

          cd "${{ github.workspace }}/.cache/cJSON"
          mkdir -p build
          cd build
          cmake .. -DENABLE_CJSON_UTILS=On -DENABLE_CJSON_TEST=Off -DCMAKE_INSTALL_PREFIX=/usr
          make -j"$(nproc)"
          sudo make install
          sudo ldconfig

      - name: Build AFL tools from source
        run: |
          sudo make -j"$(nproc)"

      - name: Restore preeny cache
        id: cache-preeny
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.deps/preeny
          key: ${{ runner.os }}-preeny-zardus-master-v1

      - name: Build preeny desock.so
        if: steps.cache-preeny.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 https://github.com/zardus/preeny.git /tmp/preeny
          make -C /tmp/preeny/src desock.so
          mkdir -p "${{ github.workspace }}/.deps/preeny"
          cp /tmp/preeny/src/desock.so "${{ github.workspace }}/.deps/preeny/desock.so"
          test -f "${{ github.workspace }}/.deps/preeny/desock.so"
          ls -lah "${{ github.workspace }}/.deps/preeny/desock.so"

      - name: Restore AFL state from previous segment
        if: ${{ inputs.resume_run_id != '' && inputs.resume_artifact_name != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cd libiec61850-1.5.1/build/examples/server_example_basic_io
          rm -rf outputs_test
          mkdir -p /tmp/afl-resume
          gh run download "${{ inputs.resume_run_id }}" \
            -n "${{ inputs.resume_artifact_name }}" \
            -D /tmp/afl-resume
          tar -xzf /tmp/afl-resume/fuzzing-findings.tar.gz
          test -d outputs_test/queue
          echo "Resumed AFL queue from run ${{ inputs.resume_run_id }} / artifact ${{ inputs.resume_artifact_name }}"

      - name: Prepare runner for AFL crash detection
        shell: bash
        run: |
          echo "Before: $(cat /proc/sys/kernel/core_pattern)"
          sudo sysctl -w kernel.core_pattern=core
          echo "After:  $(cat /proc/sys/kernel/core_pattern)"

      - name: Run AFL fuzzing for limited time
        shell: bash
        run: |
          cd libiec61850-1.5.1/build/examples/server_example_basic_io
          mkdir -p outputs_test logs
          chmod +x ./server_example_basic_io
          export AFL_NO_UI=1

          test -f "${{ github.workspace }}/.deps/preeny/desock.so"

          afl_input_dir="inputs/seed_bin_origin"
          if [ -d outputs_test/queue ]; then
            afl_input_dir="-"
            echo "Continuing AFL with existing outputs_test corpus"
          else
            echo "Starting AFL from seed corpus"
          fi

          cleanup() {
            if [ -n "${MON_PID:-}" ]; then
              kill "$MON_PID" 2>/dev/null || true
              wait "$MON_PID" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          (
            while true; do
              sleep 1000
              echo "===== $(date) ====="
              if [ -f outputs_test/fuzzer_stats ]; then
                cat outputs_test/fuzzer_stats
                echo
              else
                echo "fuzzer_stats not generated yet"
                echo
              fi
            done
          ) &
          MON_PID=$!

          set +e
          timeout 21300 bash -c '
            LD_PRELOAD="${{ github.workspace }}/.deps/preeny/desock.so" \
            ../../../../afl-fuzz \
              -i "$afl_input_dir" \
              -o outputs_test/ \
              -m none \
              -- ./server_example_basic_io
          ' 2>&1 | tee "logs/afl-fuzz-live-seg-${{ inputs.run_segment }}.log"
          rc=${PIPESTATUS[0]}
          set -e

          echo "afl/timeout exit code: $rc"

          if [ -f outputs_test/default/plot_data ]; then
            echo "===== plot_data tail ====="
            tail -n 20 outputs_test/default/plot_data | tee "logs/plot_data_tail-seg-${{ inputs.run_segment }}.log"
          fi

          if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
            exit "$rc"
          fi

      - name: Pack fuzzing results
        if: always()
        shell: bash
        run: |
          cd libiec61850-1.5.1/build/examples/server_example_basic_io
          tar -czf fuzzing-findings.tar.gz outputs_test

      - name: Upload fuzzing log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-log-seg-${{ inputs.run_segment }}
          path: libiec61850-1.5.1/build/examples/server_example_basic_io/logs/

      - name: Upload plot_data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-plot-data-seg-${{ inputs.run_segment }}
          path: libiec61850-1.5.1/build/examples/server_example_basic_io/outputs_test/default/plot_data
          if-no-files-found: warn

      - name: Upload fuzzing results archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-findings-seg-${{ inputs.run_segment }}
          path: libiec61850-1.5.1/build/examples/server_example_basic_io/fuzzing-findings.tar.gz

      - name: Trigger next fuzzing segment
        if: ${{ success() && fromJSON(inputs.run_segment) < fromJSON(inputs.max_segments) }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          next_segment=$(( ${{ inputs.run_segment }} + 1 ))
          current_artifact="fuzzing-findings-seg-${{ inputs.run_segment }}"

          echo "Triggering segment ${next_segment}/${{ inputs.max_segments }} based on current AFL outputs"

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/IEC-61850_fuzzing.yml/dispatches" \
            -d @- <<EOF
          {
            "ref": "main",
            "inputs": {
              "target_branch": "${{ inputs.target_branch }}",
              "run_segment": "${next_segment}",
              "max_segments": "${{ inputs.max_segments }}",
              "resume_run_id": "${{ github.run_id }}",
              "resume_artifact_name": "${current_artifact}"
            }
          }
          EOF